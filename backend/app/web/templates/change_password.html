{% extends "_layout.html" %}
{% block title %}修改密码 · FamilySafety{% endblock %}
{% block heading %}修改密码{% endblock %}
{% set active = 'pwd' %}
{% block content %}
<div class="panel" style="max-width: 480px;">
  <h3 class="panel-title">修改登录密码</h3>
  <form method="post" action="/web/change-password" class="form" novalidate>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    {% if ok %}<div class="alert alert-success">密码已更新,下次登录请使用新密码。</div>{% endif %}
    <label class="field">
      <span>当前密码</span>
      <input type="password" name="old_password" required minlength="1" autocomplete="current-password" />
      <div class="field-error"></div>
    </label>
    <label class="field">
      <span>新密码</span>
      <input type="password" name="new_password" required minlength="8" maxlength="128" autocomplete="new-password" />
      <div class="field-hint">至少 8 个字符。建议混合字母与数字。</div>
      <div class="field-error"></div>
    </label>
    <label class="field">
      <span>确认新密码</span>
      <input type="password" name="confirm_password" required minlength="8" maxlength="128" autocomplete="new-password" />
      <div class="field-hint">再次输入新密码以确认。</div>
      <div class="field-error"></div>
    </label>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">保存</button>
      <a href="/web/dashboard" class="btn btn-ghost">取消</a>
    </div>
  </form>
</div>
{% endblock %}
