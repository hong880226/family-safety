name: Build & Publish Docker Image to Aliyun

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom image tag (leave blank for short SHA)'
        required: false
        default: ''

env:
  REGION: cn-hangzhou
  IMAGE_NAME: familysafety-backend

jobs:
  build-and-push:
    name: Build & push backend image
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write
      id-token: write   # required for OIDC-based registry auth (not used here, kept for future)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: meta
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.${{ env.REGION }}.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            registry.${{ env.REGION }}.aliyuncs.com/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            registry.${{ env.REGION }}.aliyuncs.com/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}

      - name: Verify manifest lists both architectures
        env:
          VERIFY_IMAGE: registry.${{ env.REGION }}.aliyuncs.com/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
        run: |
          echo "Inspecting manifest of ${VERIFY_IMAGE}"
          docker buildx imagetools inspect "${VERIFY_IMAGE}"
          # Fail loud if the manifest list is missing entries.
          if ! docker buildx imagetools inspect "${VERIFY_IMAGE}" --raw | grep -q '"sha256:'; then
            echo "ERROR: no manifest entries found"
            docker buildx imagetools inspect "${VERIFY_IMAGE}" --raw || true
            exit 1
          fi

      - name: Smoke test amd64 (start container, hit /healthz)
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          FULL_IMAGE: registry.${{ env.REGION }}.aliyuncs.com/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
        run: |
          echo "Smoke-testing ${FULL_IMAGE} (linux/amd64 variant)…"
          # Clean up any stale container from a previous failed run.
          docker rm -f fs-smoke 2>/dev/null || true
          # Pin to amd64 to avoid running arm64-on-x86_64 (qemu) for the smoke test.
          # Use a file-backed sqlite so create_all has a real DB. Scheduler
          # skipped because ENVIRONMENT=dev.
          docker run --rm -d --name fs-smoke -p 18000:8000 \
            --platform linux/amd64 \
            -e DATABASE_URL='sqlite+aiosqlite:////tmp/fs-smoke.db' \
            -e REDIS_URL='redis://127.0.0.1:1/0' \
            -e JWT_SECRET='smoke-test-secret-not-for-prod-32chars' \
            -e ENVIRONMENT='dev' \
            -e LLM_BASE_URL='http://mock' \
            -e LLM_API_KEY='mock' \
            -e CORS_ORIGINS='http://localhost' \
            "${FULL_IMAGE}"
          # wait up to 30s for /healthz; dump logs on failure for fast triage
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18000/healthz >/dev/null 2>&1; then
              echo "✓ /healthz OK after ${i}s"
              ok=1
              break
            fi
            sleep 1
          done
          if [ "$ok" != "1" ]; then
            echo "✗ smoke test failed — last 80 lines of container log:"
            docker logs --tail=80 fs-smoke || true
            exit 1
          fi
          docker stop fs-smoke

      - name: Print image digest
        run: |
          echo "## Docker image published (multi-arch)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Region: registry.${{ env.REGION }}.aliyuncs.com" >> "$GITHUB_STEP_SUMMARY"
          echo "- Namespace: \${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ env.IMAGE_NAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags: \`${{ steps.meta.outputs.tag }}\`, \`latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pull (amd64): \`docker pull --platform linux/amd64 registry.${{ env.REGION }}.aliyuncs.com/\${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pull (arm64): \`docker pull --platform linux/arm64 registry.${{ env.REGION }}.aliyuncs.com/\${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
