name: Build & Publish Docker Image to Aliyun

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom image tag (leave blank for short SHA)'
        required: false
        default: ''

env:
  REGION: cn-hangzhou
  IMAGE_NAME: familysafety-backend

jobs:
  build-and-push:
    name: Build & push backend image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      id-token: write   # required for OIDC-based registry auth (not used here, kept for future)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: meta
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.${{ env.REGION }}.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            registry.${{ env.REGION }}.aliyuncs.com/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            registry.${{ env.REGION }}.aliyuncs.com/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}

      - name: Smoke test (start container, hit /healthz)
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.tag }}"
          FULL_IMAGE="registry.${{ env.REGION }}.aliyuncs.com/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "Smoke-testing ${FULL_IMAGE}…"
          docker run --rm -d --name fs-smoke -p 18000:8000 \
            -e DATABASE_URL='sqlite+aiosqlite:///:memory:' \
            -e REDIS_URL='redis://localhost:6379/0' \
            -e JWT_SECRET='smoke-test-secret-not-for-prod' \
            -e ENVIRONMENT='dev' \
            -e LLM_BASE_URL='http://mock' \
            -e LLM_API_KEY='mock' \
            "${FULL_IMAGE}"
          # wait up to 30s for /healthz
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18000/healthz >/dev/null 2>&1; then
              echo "✓ /healthz OK after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:18000/healthz || (echo "✗ smoke test failed"; docker logs fs-smoke; exit 1)
          docker stop fs-smoke

      - name: Print image digest
        run: |
          echo "## Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Region: registry.${{ env.REGION }}.aliyuncs.com" >> "$GITHUB_STEP_SUMMARY"
          echo "- Namespace: \${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ env.IMAGE_NAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags: \`${{ steps.meta.outputs.tag }}\`, \`latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pull: \`docker pull registry.${{ env.REGION }}.aliyuncs.com/\${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
